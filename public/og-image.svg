<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="157.5" x2="1200" y2="157.5" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="472.5" x2="1200" y2="472.5" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Decorative nodes (left side) -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="8" fill="#06B6D4"/>
    <circle cx="150" cy="180" r="6" fill="#8B5CF6"/>
    <circle cx="120" cy="250" r="7" fill="#EC4899"/>
    <line x1="100" y1="100" x2="150" y2="180" stroke="#06B6D4" stroke-width="2"/>
    <line x1="150" y1="180" x2="120" y2="250" stroke="#8B5CF6" stroke-width="2"/>
  </g>
  
  <!-- Main content -->
  <g>
    <!-- Logo/Brand name -->
    <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
      Diagflow
    </text>
    
    <!-- Tagline -->
    <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94A3B8" text-anchor="middle">
      AI-Powered Diagram Generation
    </text>
    
    <!-- Feature highlights -->
    <g transform="translate(300, 320)">
      <!-- Flowcharts -->
      <g>
        <rect x="0" y="0" width="160" height="100" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-width="2"/>
        <text x="80" y="35" font-family="monospace" font-size="14" fill="#06B6D4" text-anchor="middle" font-weight="600">flowchart TD</text>
        <circle cx="80" cy="55" r="8" fill="#06B6D4" opacity="0.5"/>
        <line x1="80" y1="63" x2="80" y2="75" stroke="#06B6D4" stroke-width="2"/>
        <circle cx="80" cy="83" r="8" fill="#06B6D4" opacity="0.5"/>
      </g>
      
      <!-- Sequence -->
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="160" height="100" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
        <text x="80" y="35" font-family="monospace" font-size="14" fill="#8B5CF6" text-anchor="middle" font-weight="600">sequenceDiagram</text>
        <line x1="30" y1="50" x2="130" y2="50" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowhead)"/>
        <line x1="130" y1="65" x2="30" y2="65" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,4"/>
      </g>
      
      <!-- Architecture -->
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="160" height="100" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2"/>
        <text x="80" y="35" font-family="monospace" font-size="14" fill="#EC4899" text-anchor="middle" font-weight="600">C4Context</text>
        <rect x="40" y="50" width="100" height="35" rx="4" fill="none" stroke="#EC4899" stroke-width="2"/>
        <text x="90" y="72" font-family="monospace" font-size="10" fill="#EC4899" text-anchor="middle">System</text>
      </g>
    </g>
  </g>
  
  <!-- Footer badge -->
  <g transform="translate(920, 550)">
    <rect x="0" y="0" width="240" height="50" rx="25" fill="#1E293B" opacity="0.8"/>
    <text x="120" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#A78BFA" text-anchor="middle">
      ⚡ Powered by Gemini AI
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
