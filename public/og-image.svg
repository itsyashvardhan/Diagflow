<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="40%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>

    <!-- Logo gradient (brand orange) -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="logo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Ambient orbs -->
  <circle cx="200" cy="500" r="200" fill="#f97316" opacity="0.04" />
  <circle cx="1000" cy="130" r="250" fill="#8b5cf6" opacity="0.05" />

  <!-- Decorative diagram nodes (left) -->
  <g opacity="0.15">
    <circle cx="80" cy="120" r="6" fill="#f97316" />
    <circle cx="140" cy="190" r="5" fill="#a78bfa" />
    <circle cx="95" cy="270" r="5" fill="#60a5fa" />
    <line x1="80" y1="120" x2="140" y2="190" stroke="#f97316" stroke-width="1.5" />
    <line x1="140" y1="190" x2="95" y2="270" stroke="#a78bfa" stroke-width="1.5" />
  </g>

  <!-- Decorative diagram nodes (right) -->
  <g opacity="0.15">
    <circle cx="1100" cy="380" r="6" fill="#f59e0b" />
    <circle cx="1050" cy="460" r="5" fill="#8b5cf6" />
    <circle cx="1120" cy="530" r="5" fill="#06b6d4" />
    <line x1="1100" y1="380" x2="1050" y2="460" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="1050" y1="460" x2="1120" y2="530" stroke="#8b5cf6" stroke-width="1.5" />
  </g>

  <!-- Diagflo Logo (centered, large) -->
  <g transform="translate(520, 110) scale(2.4)" filter="url(#logo-glow)">
    <g transform="scale(1.1) translate(-3,-3)">
      <path d="M22 17 V47" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" />
      <path d="M22 17 H32 C43 17 47 25 47 32 C47 39 43 47 32 47 H22" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <circle cx="47" cy="32" r="4" fill="url(#logo-grad)" />
    </g>
  </g>

  <!-- Brand name -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#text-glow)" letter-spacing="-2">
    Diagflo
  </text>

  <!-- Tagline -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94A3B8" text-anchor="middle">
    Intelligent Diagram Generation
  </text>

  <!-- Feature pills -->
  <g text-anchor="middle">
    <!-- Pill 1: Flowcharts -->
    <rect x="320" y="442" width="140" height="36" rx="18" fill="#1E293B" stroke="#f97316" stroke-width="1.5" opacity="0.9" />
    <text x="390" y="466" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f97316">⚡ Flowcharts</text>

    <!-- Pill 2: Charts -->
    <rect x="530" y="442" width="140" height="36" rx="18" fill="#1E293B" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9" />
    <text x="600" y="466" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">📊 Charts</text>

    <!-- Pill 3: Architecture -->
    <rect x="740" y="442" width="140" height="36" rx="18" fill="#1E293B" stroke="#06b6d4" stroke-width="1.5" opacity="0.9" />
    <text x="810" y="466" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#06b6d4">🏗️ Architecture</text>
  </g>

  <!-- Powered by badge -->
  <rect x="475" y="520" width="250" height="40" rx="20" fill="#1E293B" opacity="0.7" />
  <text x="600" y="546" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#a78bfa" text-anchor="middle">
    ✨ Powered by Gemini AI
  </text>
</svg>
