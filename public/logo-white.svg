        <feGaussianBlur stdDeviation="2" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    </defs>
    <g transform="scale(1.1) translate(-3,-3)">
    <path d="M22 17 V47" stroke="white" stroke-width="6" stroke-linecap="round" />
