<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Outer rounded container -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#brandGradient)"/>
  
  <!-- Geometric "D" shape with integrated flow paths -->
  <!-- Main D outline - left vertical stem -->
  <path 
    d="M20 14 L20 50" 
    stroke="white" 
    stroke-width="4" 
    stroke-linecap="round"
    opacity="0.95"
  />
  
  <!-- D curve - right side -->
  <path 
    d="M20 14 
       C20 14, 28 14, 36 18
       C44 22, 48 28, 48 32
       C48 36, 44 42, 36 46
       C28 50, 20 50, 20 50" 
    stroke="white" 
    stroke-width="4" 
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.95"
  />
  
  <!-- Internal flow path 1 - horizontal -->
  <path 
    d="M24 32 L38 32" 
    stroke="white" 
    stroke-width="2.5" 
    stroke-linecap="round"
    opacity="0.7"
  />
  
  <!-- Internal flow path 2 - diagonal top -->
  <path 
    d="M24 24 L34 28" 
    stroke="white" 
    stroke-width="2" 
    stroke-linecap="round"
    opacity="0.5"
  />
  
  <!-- Internal flow path 3 - diagonal bottom -->
  <path 
    d="M24 40 L34 36" 
    stroke="white" 
    stroke-width="2" 
    stroke-linecap="round"
    opacity="0.5"
  />
  
  <!-- Node accent - center right (AI/main node) -->
  <circle cx="40" cy="32" r="3.5" fill="white" opacity="0.95"/>
  
  <!-- Node accent - top connection -->
  <circle cx="24" cy="24" r="2.5" fill="white" opacity="0.8"/>
  
  <!-- Node accent - bottom connection -->
  <circle cx="24" cy="40" r="2.5" fill="white" opacity="0.8"/>
</svg>
